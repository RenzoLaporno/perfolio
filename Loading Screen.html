<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Renzo — Loading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas: #f3ece1;
    --canvas-2:#ece2d2;
    --ink:    #1c1a17;
    --teal:   #2d6e75;
    --teal-2: #3a8a8f;
    --coral:  #d4623a;
    --coral-2:#e8825a;
    --crim:   #a8333a;
    --mustard:#c69633;
    --plum:   #5a2a3a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--canvas);color:var(--ink);font-family:"Cormorant Garamond", Georgia, serif;}
  .stage{
    position:fixed; inset:0;
    background:
      radial-gradient(120% 80% at 50% 0%, #faf3e6 0%, var(--canvas) 45%, var(--canvas-2) 100%);
    overflow:hidden;
  }
  .grain{
    position:absolute; inset:-2%; pointer-events:none; opacity:.35; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .blooms{position:absolute; inset:0; filter:blur(28px); opacity:.55; mix-blend-mode:multiply;}
  .bloom{position:absolute; border-radius:50%; will-change: transform;}
  .b1{width:46vw;height:46vw; left:-10vw; top:-12vw; background:radial-gradient(circle,#d4623a 0%, rgba(212,98,58,0) 65%); animation: drift1 14s ease-in-out infinite alternate;}
  .b2{width:40vw;height:40vw; right:-8vw; top:-6vw; background:radial-gradient(circle,#2d6e75 0%, rgba(45,110,117,0) 60%); animation: drift2 16s ease-in-out infinite alternate;}
  .b3{width:36vw;height:36vw; left:30vw; bottom:-12vw; background:radial-gradient(circle,#a8333a 0%, rgba(168,51,58,0) 62%); animation: drift3 18s ease-in-out infinite alternate;}
  .b4{width:30vw;height:30vw; right:18vw; bottom:-8vw; background:radial-gradient(circle,#c69633 0%, rgba(198,150,51,0) 60%); animation: drift4 13s ease-in-out infinite alternate;}
  @keyframes drift1{ to{ transform: translate(8vw, 6vw) scale(1.15);} }
  @keyframes drift2{ to{ transform: translate(-6vw, 8vw) scale(1.1);} }
  @keyframes drift3{ to{ transform: translate(-8vw, -6vw) scale(1.2);} }
  @keyframes drift4{ to{ transform: translate(6vw, -4vw) scale(1.1);} }

  .center{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:40px;
  }
  .eyebrow{
    font-family:"JetBrains Mono", ui-monospace, monospace;
    font-size:11px; letter-spacing:.32em; text-transform:uppercase;
    color:#5a4f43; opacity:0; transform:translateY(8px);
    animation:fadeUp .9s .25s ease-out forwards;
  }
  .eyebrow .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--coral);margin:0 10px 1px;vertical-align:middle;
    box-shadow:0 0 0 3px rgba(212,98,58,.15);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:translateY(0) scale(1);opacity:1}50%{transform:translateY(0) scale(1.25);opacity:.7}}

  .wordmark{
    position:relative;
    margin:18px 0 8px;
    line-height:.86;
    letter-spacing:-.02em;
    font-weight:500;
    font-size:clamp(96px, 18vw, 260px);
    animation: breathe 5s ease-in-out infinite;
  }
  @keyframes breathe{ 0%,100%{ transform: scale(1);} 50%{ transform: scale(1.015);} }
  .wordmark .ghost{
    color:transparent;
    -webkit-text-stroke:1.2px rgba(28,26,23,.18);
  }
  .wordmark .fill{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, var(--teal) 0%, var(--teal-2) 35%, var(--crim) 70%, var(--coral) 100%);
    -webkit-background-clip:text; background-clip:text;
    color:transparent;
    -webkit-mask: linear-gradient(180deg, #000 var(--reveal,0%), transparent calc(var(--reveal,0%) + 0.5%));
            mask: linear-gradient(180deg, #000 var(--reveal,0%), transparent calc(var(--reveal,0%) + 0.5%));
  }
  .tag{
    font-style:italic; font-weight:400; color:#3a342c;
    font-size:clamp(16px,1.6vw,22px);
    letter-spacing:.01em;
    margin-top:6px;
    opacity:0; transform:translateY(8px);
    animation:fadeUp .9s 1.0s ease-out forwards;
  }
  .tag em{color:var(--crim); font-style:italic; font-weight:600;}

  .progress-wrap{
    position:absolute; left:50%; bottom:9vh; transform:translateX(-50%);
    width:min(560px, 78vw);
    display:flex; flex-direction:column; gap:14px; align-items:stretch;
    opacity:0; animation:fadeUp .9s .6s ease-out forwards;
  }
  .meta{
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:"JetBrains Mono", monospace; font-size:11px; letter-spacing:.28em;
    text-transform:uppercase; color:#3a342c;
  }
  .meta .pct{ font-size:13px; color:var(--ink); }
  .meta .pct b{ font-weight:500; }
  .bar{
    position:relative; height:2px; background:rgba(28,26,23,.12); border-radius:2px; overflow:visible;
  }
  .bar .fill{
    position:absolute; left:0; top:0; bottom:0;
    width:var(--p,0%);
    background:linear-gradient(90deg, var(--teal), var(--crim) 60%, var(--coral));
    border-radius:2px;
    transition:width .15s linear;
  }
  .bar .head{
    position:absolute; left:var(--p,0%); top:50%; transform:translate(-50%,-50%);
    width:14px; height:14px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #ffd9c4, var(--coral) 55%, var(--crim) 100%);
    box-shadow:0 6px 14px rgba(168,51,58,.35), 0 0 0 4px rgba(212,98,58,.18);
    transition:left .15s linear;
  }
  .bar .drop{
    position:absolute; left:var(--p,0%); top:9px;
    width:6px; height:0;
    background:linear-gradient(180deg, var(--coral), var(--crim));
    border-radius:0 0 50% 50% / 0 0 60% 60%;
    transform:translateX(-50%);
    transition: height .9s cubic-bezier(.6,.0,.4,1), opacity .4s;
  }
  .stage[data-drop="1"] .bar .drop{ height:42px; opacity:1; }
  .stage[data-drop="0"] .bar .drop{ height:0; opacity:0; }

  .label-row{ display:flex; justify-content:space-between; font-family:"JetBrains Mono", monospace; font-size:10px; letter-spacing:.24em; color:#6b5e4f; text-transform:uppercase;}

  .drips{position:absolute; inset:0; pointer-events:none;}
  .drip{ position:absolute; top:0; }
  .drip svg{ display:block; overflow:visible; }
  .drip .stroke{
    fill:none;
    stroke-linecap:round;
    stroke-dasharray: var(--len,1000);
    stroke-dashoffset: var(--len,1000);
    animation: drawDrip var(--dur,3.2s) var(--delay,0s) cubic-bezier(.7,.02,.32,1) forwards,
               wiggle 3.5s var(--delay,0s) ease-in-out infinite;
    filter: drop-shadow(0 1px 0 rgba(0,0,0,0.08));
  }
  @keyframes wiggle{ 0%,100%{ filter: drop-shadow(0 1px 0 rgba(0,0,0,0.08));} 50%{ filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12));} }
  .drip .bead{
    transform-origin:center;
    opacity:0;
    animation: bead 1.1s var(--bdelay,2.4s) ease-out forwards,
               beadPulse 2.4s calc(var(--bdelay,2.4s) + 1.1s) ease-in-out infinite;
  }
  @keyframes beadPulse{ 0%,100%{ transform: translateY(2px) scale(1);} 50%{ transform: translateY(4px) scale(1.18);} }
  .drip .splash{
    transform-origin:center;
    opacity:0;
    animation: splash 1.2s var(--sdelay,2.6s) cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes drawDrip{ to{ stroke-dashoffset: 0; } }
  @keyframes bead{
    0%{opacity:0; transform: translateY(-10px) scale(.4);}
    40%{opacity:1; transform: translateY(0) scale(1.1);}
    100%{opacity:1; transform: translateY(2px) scale(1);}
  }
  @keyframes splash{
    0%{opacity:0; transform: scale(.2);}
    60%{opacity:.95;}
    100%{opacity:.85; transform: scale(1);}
  }

  .speck{
    position:absolute; border-radius:50%; opacity:0;
    animation: speckIn .9s var(--d,0s) cubic-bezier(.2,.8,.2,1) forwards,
               speckFloat var(--fdur,6s) var(--d,0s) ease-in-out infinite alternate;
    mix-blend-mode:multiply;
  }
  @keyframes speckIn{
    0%{opacity:0; transform:scale(.2)}
    60%{opacity:.95}
    100%{opacity:.9; transform:scale(1)}
  }
  @keyframes speckFloat{
    to{ transform: translate(var(--fx,10px), var(--fy,-12px)) scale(1.05); }
  }

  /* falling droplets */
  .falling{ position:absolute; inset:0; pointer-events:none; z-index:2; }
  .fdrop{
    position:absolute; top:-30px;
    width:10px; height:14px;
    border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
    transform: translateX(-50%);
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.15));
    will-change: transform, top;
  }

  /* radial pulse rings on drop landings */
  .ring{
    position:absolute; border-radius:50%; border:1.5px solid currentColor;
    transform: translate(-50%,-50%) scale(0); opacity:.7;
    animation: ringExpand 1.4s ease-out forwards;
    pointer-events:none;
  }
  @keyframes ringExpand{
    0%{ transform: translate(-50%,-50%) scale(0); opacity:.6;}
    100%{ transform: translate(-50%,-50%) scale(8); opacity:0;}
  }

  .corner{
    position:absolute; left:32px; top:28px;
    font-family:"JetBrains Mono", monospace; font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:#3a342c; opacity:0; animation:fadeUp .8s .15s ease-out forwards;
  }
  .corner .glyph{display:inline-block; width:10px; height:10px; background:var(--crim); border-radius:2px; margin-right:10px; vertical-align:-1px; transform:rotate(45deg);}
  .corner-r{
    position:absolute; right:32px; top:28px;
    font-family:"JetBrains Mono", monospace; font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:#3a342c; opacity:0; animation:fadeUp .8s .25s ease-out forwards;
    text-align:right;
  }
  .corner-r small{display:block; opacity:.55; font-size:10px; letter-spacing:.28em; margin-top:4px;}

  .footer-l, .footer-r{
    position:absolute; bottom:24px; font-family:"JetBrains Mono", monospace; font-size:10px; letter-spacing:.28em; text-transform:uppercase; color:#5a4f43; opacity:0; animation:fadeUp .8s .8s ease-out forwards;
  }
  .footer-l{left:32px;}
  .footer-r{right:32px;}

  @keyframes fadeUp{ to{ opacity:1; transform:none; } }

  .stage.done .center, .stage.done .corner, .stage.done .corner-r,
  .stage.done .progress-wrap, .stage.done .footer-l, .stage.done .footer-r{
    transition: opacity .8s ease, transform .8s ease;
    opacity:0; transform: translateY(-6px);
  }
  .veil{
    position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(180deg, var(--canvas) 0%, var(--canvas) 100%);
    opacity:0; transition: opacity 1s ease .3s;
  }
  .stage.done .veil{ opacity:1; }

  .replay{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    opacity:0; pointer-events:none; transition:opacity .5s;
    font-family:"JetBrains Mono", monospace; font-size:11px; letter-spacing:.28em; text-transform:uppercase;
    color:#3a342c; border:1px solid rgba(28,26,23,.25); background:rgba(255,255,255,.5);
    padding:14px 22px; border-radius:999px; cursor:pointer; backdrop-filter: blur(6px);
  }
  .stage.done .replay{ opacity:1; pointer-events:auto; transition:opacity .6s 1.4s;}
  .replay:hover{ background:#fff; border-color:var(--crim); color:var(--crim);}

  @media (max-width:640px){
    .center{ padding:20px; justify-content:flex-start; padding-top:22vh; }
    .corner{ left:18px; top:18px; font-size:10px; letter-spacing:.18em; }
    .corner-r{ right:18px; top:18px; font-size:10px; letter-spacing:.18em; }
    .corner-r small{ display:none; }
    .corner .glyph{ width:8px; height:8px; margin-right:8px; }
    .eyebrow{ font-size:10px; letter-spacing:.24em; text-align:center; }
    .wordmark{
      font-size:clamp(64px, 22vw, 140px);
      margin:14px 0 6px;
    }
    .tag{
      font-size:15px;
      text-align:center;
      padding:0 12px;
      line-height:1.35;
    }
    .progress-wrap{
      width:calc(100vw - 32px);
      left:16px;
      transform:none;
      bottom:calc(72px + env(safe-area-inset-bottom, 0px));
      gap:12px;
    }
    .meta{
      font-size:10px;
      letter-spacing:.18em;
      gap:12px;
      flex-wrap:nowrap;
    }
    .meta > span:first-child{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
      flex:1 1 auto;
    }
    .meta .pct{ font-size:12px; white-space:nowrap; flex:0 0 auto; }
    .bar{ height:3px; }
    .bar .head{ width:12px; height:12px; }
    .label-row{ font-size:9px; letter-spacing:.16em; }
    .label-row span:last-child{ display:none; }
    .label-row span:first-child{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }
    .footer-l, .footer-r{
      font-size:9px;
      letter-spacing:.18em;
      bottom:18px;
    }
    .footer-l{ left:18px; }
    .footer-r{ right:18px; }
  }
  @media (max-width:420px){
    .center{ padding-top:24vh; }
    .wordmark{ font-size:clamp(56px, 24vw, 110px); }
    .tag{ font-size:14px; }
    .corner, .corner-r{ font-size:9px; }
    .footer-r{ display:none; }
    .footer-l{ right:18px; text-align:center; left:18px; }
    .progress-wrap{ bottom:calc(56px + env(safe-area-inset-bottom, 0px)); }
    .meta{ font-size:9px; letter-spacing:.14em; }
    .meta .pct{ font-size:11px; }
  }
  @media (max-height:560px) and (orientation:landscape){
    .center{ padding-top:0; justify-content:center; }
    .wordmark{ font-size:clamp(48px, 12vw, 96px); margin:6px 0; }
    .progress-wrap{ bottom:24px; width:min(560px, 86vw); }
    .corner, .corner-r{ top:14px; }
  }
  @media (hover:none) and (pointer:coarse){
    .label-row span:last-child{ display:none; }
  }
</style>
</head>
<body>
<div id="stage" class="stage" data-drop="0">

  <div class="blooms">
    <div class="bloom b1"></div>
    <div class="bloom b2"></div>
    <div class="bloom b3"></div>
    <div class="bloom b4"></div>
  </div>

  <div class="grain"></div>

  <div class="drips" id="drips"></div>

  <div class="falling" id="falling"></div>

  <div id="specks"></div>

  <div id="rings" style="position:absolute; inset:0; pointer-events:none; z-index:3;"></div>

  <div class="center">
    <div class="eyebrow"><span class="dot"></span>Mixing the palette<span class="dot"></span></div>
    <div class="wordmark" aria-label="Renzo">
      <span class="ghost">Renzo</span>
      <span class="fill" id="fill" style="--reveal:0%">Renzo</span>
    </div>
    <div class="tag">A passionate <em>Software Developer</em> · building with care &amp; craft.</div>
  </div>

  <div class="progress-wrap">
    <div class="meta">
      <span>Loading the canvas</span>
      <span class="pct"><b id="pct">00</b>&nbsp;/&nbsp;100</span>
    </div>
    <div class="bar">
      <div class="fill" id="barFill"></div>
      <div class="head" id="barHead"></div>
      <div class="drop" id="barDrop"></div>
    </div>
    <div class="label-row">
      <span id="phase">Priming brushes</span>
      <span>Ctrl + R · Replay</span>
    </div>
  </div>

  <div class="footer-l">EST · 2024 — Lima → Worldwide</div>
  <div class="footer-r">Hand-painted with HTML &amp; CSS</div>

  <div class="veil"></div>
  <button class="replay" id="replay" type="button">↻ Replay</button>
</div>

<script>
(function buildDrips(){
  const colors = [
    {c:'#2d6e75', w:14},
    {c:'#d4623a', w:18},
    {c:'#a8333a', w:12},
    {c:'#c69633', w:10},
    {c:'#5a2a3a', w:9 },
    {c:'#3a8a8f', w:11},
    {c:'#e8825a', w:8 },
    {c:'#2d6e75', w:7 },
    {c:'#a8333a', w:16},
    {c:'#d4623a', w:10},
    {c:'#5a2a3a', w:7 },
    {c:'#c69633', w:6 },
  ];
  const N = colors.length;
  const drips = document.getElementById('drips');
  const H = window.innerHeight;

  const positions = [];
  for(let i=0;i<N;i++){
    const x = (i + 0.5)/N * 100 + (Math.random()*4 - 2);
    positions.push(x);
  }
  positions.sort(()=>Math.random()-0.5);

  positions.forEach((xPct, i)=>{
    const {c, w} = colors[i];
    const len = 60 + Math.random()*Math.min(360, H*0.55);
    const wob = 8 + Math.random()*22;
    const dir = Math.random()<0.5 ? -1 : 1;
    const sw = Math.max(3, w*0.45);
    const vbW = 80, vbH = len + 80;
    const startX = vbW/2;
    const c1x = startX + dir*wob, c1y = len*0.35;
    const c2x = startX - dir*wob*0.8, c2y = len*0.7;
    const ex  = startX + dir*wob*0.2, ey = len;
    const path = `M ${startX} 0 C ${c1x} ${c1y}, ${c2x} ${c2y}, ${ex} ${ey}`;
    const pathLen = len * 1.18;

    const dur = 2.4 + Math.random()*2.0;
    const delay = 0.05 + (i % 4)*0.18 + Math.random()*0.6;

    const beadR = 4 + Math.random()*5 + sw*0.3;

    const splashCount = 2 + Math.floor(Math.random()*3);
    let splashes = '';
    for(let s=0;s<splashCount;s++){
      const sx = ex + (Math.random()*40 - 20);
      const sy = ey + 14 + Math.random()*16;
      const sr = 1.2 + Math.random()*3.2;
      splashes += `<circle class="splash" style="--sdelay:${(delay+dur*0.85+0.1+s*0.06).toFixed(2)}s" cx="${sx}" cy="${sy}" r="${sr}" fill="${c}" opacity=".85"/>`;
    }

    const html = `
      <div class="drip" style="left:${xPct}%; transform:translateX(-50%);">
        <svg width="${vbW}" height="${vbH}" viewBox="0 0 ${vbW} ${vbH}">
          <path class="stroke"
                d="${path}"
                stroke="${c}"
                stroke-width="${sw}"
                style="--len:${pathLen.toFixed(0)}; --dur:${dur.toFixed(2)}s; --delay:${delay.toFixed(2)}s;" />
          <circle class="bead"
                  cx="${ex}" cy="${ey}" r="${beadR.toFixed(1)}"
                  fill="${c}"
                  style="--bdelay:${(delay+dur*0.92).toFixed(2)}s;" />
          ${splashes}
        </svg>
      </div>`;
    drips.insertAdjacentHTML('beforeend', html);
  });
})();

(function specks(){
  const root = document.getElementById('specks');
  const colors = ['#2d6e75','#d4623a','#a8333a','#c69633','#5a2a3a','#3a8a8f','#e8825a'];
  const isSmall = window.matchMedia('(max-width:640px)').matches;
  const N = isSmall ? 36 : 80;
  for(let i=0;i<N;i++){
    const s = document.createElement('span');
    s.className='speck';
    const size = 2 + Math.pow(Math.random(),2.4)*24;
    s.style.width = size+'px'; s.style.height = size+'px';
    s.style.left = (Math.random()*100)+'%';
    s.style.top  = (Math.random()*100)+'%';
    s.style.background = colors[Math.floor(Math.random()*colors.length)];
    s.style.opacity = (.5 + Math.random()*.45);
    s.style.setProperty('--d', (1.5 + Math.random()*3.5).toFixed(2)+'s');
    s.style.setProperty('--fx', ((Math.random()*2-1)*30).toFixed(1)+'px');
    s.style.setProperty('--fy', ((Math.random()*2-1)*30).toFixed(1)+'px');
    s.style.setProperty('--fdur', (4 + Math.random()*6).toFixed(1)+'s');
    s.style.filter = `blur(${Math.random()<0.3 ? 1.5 : 0}px)`;
    root.appendChild(s);
  }
})();

(function fallingDrops(){
  const root = document.getElementById('falling');
  const ringsRoot = document.getElementById('rings');
  const colors = ['#2d6e75','#d4623a','#a8333a','#c69633','#5a2a3a','#3a8a8f','#e8825a'];
  function spawn(){
    const W = window.innerWidth, H = window.innerHeight;
    const c = colors[Math.floor(Math.random()*colors.length)];
    const x = Math.random()*W;
    const targetY = H*0.55 + Math.random()*H*0.3;
    const size = 7 + Math.random()*10;
    const dur = 1100 + Math.random()*900;
    const el = document.createElement('div');
    el.className = 'fdrop';
    el.style.left = x+'px';
    el.style.width = size+'px'; el.style.height = (size*1.4)+'px';
    el.style.background = `linear-gradient(180deg, ${c} 0%, ${c} 100%)`;
    root.appendChild(el);
    const a = el.animate([
      { top:'-30px', transform:'translateX(-50%) scaleY(.95)' },
      { top: targetY+'px', transform:'translateX(-50%) scaleY(1.6) scaleX(.78)' }
    ], { duration: dur, easing:'cubic-bezier(.5,0,.75,.2)', fill:'forwards' });
    a.onfinish = ()=>{
      el.remove();
      // pulse ring on landing
      const r = document.createElement('div');
      r.className='ring';
      r.style.left = x+'px'; r.style.top = targetY+'px';
      r.style.width = '12px'; r.style.height='12px';
      r.style.color = c;
      ringsRoot.appendChild(r);
      setTimeout(()=> r.remove(), 1500);
    };
  }
  const isSmall = window.matchMedia('(max-width:640px)').matches;
  setInterval(spawn, isSmall ? 700 : 350);
  // initial burst
  for(let i=0;i<(isSmall?3:6);i++) setTimeout(spawn, i*180);
})();

(function progress(){
  const stage = document.getElementById('stage');
  const fillBar = document.getElementById('barFill');
  const head    = document.getElementById('barHead');
  const drop    = document.getElementById('barDrop');
  const fillTxt = document.getElementById('fill');
  const pct     = document.getElementById('pct');
  const phase   = document.getElementById('phase');
  const replay  = document.getElementById('replay');

  const phases = [
    [0,   'Priming brushes'],
    [12,  'Mixing pigments'],
    [28,  'Wetting the paper'],
    [44,  'First wash · teal'],
    [58,  'Glazing · coral'],
    [72,  'Splatter · crimson'],
    [86,  'Drying inks'],
    [96,  'Signing the work'],
    [100, 'Ready']
  ];

  let p = 0, target = 0, last = performance.now();
  let lastDropAt = -10;
  function tick(now){
    const dt = Math.min(60, now - last); last = now;
    const speed = 0.022 + (p<70 ? 0.025 : 0.012);
    target = Math.min(100, target + speed * dt);
    if (Math.random()<0.004 && target<98) target -= 0.4;
    p += (target - p) * 0.18;
    const v = Math.max(0, Math.min(100, p));
    fillBar.style.setProperty('width', v+'%');
    head.style.setProperty('left', v+'%');
    drop.style.setProperty('left', v+'%');
    fillTxt.style.setProperty('--reveal', v+'%');
    pct.textContent = String(Math.floor(v)).padStart(2,'0');

    for (let i=phases.length-1;i>=0;i--){ if (v>=phases[i][0]){ phase.textContent = phases[i][1]; break; } }

    if (v - lastDropAt > 10 && v < 99){
      lastDropAt = v;
      stage.dataset.drop = '1';
      setTimeout(()=>{ stage.dataset.drop = '0'; }, 700);
    }

    if (v < 100){
      requestAnimationFrame(tick);
    } else {
      pct.textContent = '100';
      phase.textContent = 'Ready';
      setTimeout(()=> stage.classList.add('done'), 900);
    }
  }
  requestAnimationFrame((t)=>{ last = t; tick(t); });

  replay.addEventListener('click', ()=> location.reload());
})();
</script>
